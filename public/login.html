<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تسجيل الدخول</title>
  </head>
  <body data-page-key="login">
    <main class="login-screen">
      <section class="login-card">
        <div class="login-eyebrow">Cost Control System</div>
        <h1>تسجيل الدخول إلى النظام</h1>
        <p class="card-section-note">
          استخدم اسم المستخدم وكلمة المرور. أول دخول افتراضي للإدارة هو:
          <strong>admin</strong> / <strong>123456</strong>
        </p>

        <div class="grid" style="grid-template-columns: 1fr;">
          <div>
            <label for="login_username">اسم المستخدم</label>
            <input id="login_username" type="text" autocomplete="username" />
          </div>
          <div>
            <label for="login_password">كلمة المرور</label>
            <input id="login_password" type="password" autocomplete="current-password" />
          </div>
        </div>

        <div class="actions">
          <button type="button" id="loginButton">دخول</button>
        </div>

        <div id="loginMessage" class="card-section-note"></div>
      </section>
    </main>

    <script src="/js/login.js"></script>
  </body>
</html>
